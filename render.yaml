# Render Blueprint Specification
# Use this file to deploy the entire multi-service app in one click.
# Ref: https://render.com/docs/blueprints

services:
  # ---------------- Backend API Service ----------------
  - type: web
    name: marketengine-backend
    env: docker
    dockercontext: ./backend
    dockerfilepath: ./backend/Dockerfile
    plan: free # Change to 'starter' or higher for production use
    healthCheckPath: /api/v1/health # Update if a health check endpoint is available
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: marketengine-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: marketengine-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://marketengine-frontend.onrender.com # Update with your actual frontend URL after deployment
      - key: CORS_ORIGINS
        value: '["https://marketengine-frontend.onrender.com"]' # Update to match frontend URL
      # Optional API keys: Add them here or directly in the Render Dashboard
      - key: OPENAI_API_KEY
        value: ""
      - key: ANTHROPIC_API_KEY
        value: ""

  # ---------------- Celery Worker Service ----------------
  - type: worker
    name: marketengine-worker
    env: docker
    dockercontext: ./backend
    dockerfilepath: ./backend/Dockerfile
    dockerCommand: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    plan: free # Change to 'starter' or higher for production use
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: marketengine-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: marketengine-redis
          property: connectionString
      - key: SECRET_KEY
        fromService:
          type: web
          name: marketengine-backend
          property: SECRET_KEY
      - key: JWT_SECRET_KEY
        fromService:
          type: web
          name: marketengine-backend
          property: JWT_SECRET_KEY

  # ---------------- Celery Beat (Scheduler) Service ----------------
  - type: worker
    name: marketengine-beat
    env: docker
    dockercontext: ./backend
    dockerfilepath: ./backend/Dockerfile
    dockerCommand: celery -A app.workers.celery_app beat --loglevel=info
    plan: free # Change to 'starter' or higher for production use
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: marketengine-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: marketengine-redis
          property: connectionString
      - key: SECRET_KEY
        fromService:
          type: web
          name: marketengine-backend
          property: SECRET_KEY
      - key: JWT_SECRET_KEY
        fromService:
          type: web
          name: marketengine-backend
          property: JWT_SECRET_KEY

  # ---------------- Managed Redis Service ----------------
  - type: redis
    name: marketengine-redis
    plan: free # Change to 'starter' for persistent storage
    ipAllowList: [] # Access restricted to services within Render for maximum security

  # ---------------- Frontend React Static Site ----------------
  - type: web
    name: marketengine-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    routes:
      # Direct all SPA routes to index.html for React Router compatibility
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://marketengine-backend.onrender.com/api/v1 # Update this if your backend service URL differs

# ---------------- Managed PostgreSQL Service ----------------
databases:
  - name: marketengine-db
    databaseName: marketengine
    user: postgres
    plan: free # Note: Render free databases expire after 90 days. Upgrade to starter for production!
